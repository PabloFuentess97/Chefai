# =============================================================================
# ChefAI — Coolify deployment (Docker Compose mode)
# =============================================================================
#
# Coolify reads this compose file and orchestrates the services. It handles:
#   - SSL termination via Traefik (so no nginx/certbot in this file)
#   - Domain routing via labels
#   - Persistent volumes
#   - Environment variables (set in Coolify UI, never commit secrets)
#   - Auto-restart and health monitoring
#
# How to use:
#   1) In Coolify -> New Resource -> Docker Compose
#   2) Paste this file as the compose definition (or point Coolify at this
#      path in the repo)
#   3) Set all env vars in the Coolify "Environment Variables" tab (see
#      .env.coolify.example for the full list)
#   4) Coolify auto-generates the FQDN (or set your own domain). Traefik
#      labels below pick that up via $SERVICE_FQDN_WEB.
#   5) Deploy. Coolify runs migrate (one-shot) before web boots.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Madrid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot: applies schema + seeds initial data (plans, settings, admin).
  # Exits with code 0 on success. Coolify won't start `web` until this
  # service has completed successfully.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BRAND_NAME: ${BRAND_NAME}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      TZ: Europe/Madrid
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runner
    restart: always
    # Pass ALL env vars the app reads. Coolify injects them from its UI.
    environment:
      # Core
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-session}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
      TZ: Europe/Madrid
      # Branding fallbacks (Settings table in BD overrides these)
      BRAND_NAME: ${BRAND_NAME}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      # File uploads (mount this path as a persistent volume below)
      UPLOADS_DIR: ${UPLOADS_DIR:-./public/uploads}
      # Redis (BullMQ)
      REDIS_URL: ${REDIS_URL}
      # AI providers
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-openai}
      AI_IMAGE_PROVIDER: ${AI_IMAGE_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FAL_API_KEY: ${FAL_API_KEY}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # PayPal
      PAYPAL_ENV: ${PAYPAL_ENV:-live}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      # Email (Resend)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      # User-uploaded images (recipe photos, campaign hero images, blog
      # inline images). Without this volume they would vanish on every
      # deploy. Coolify mounts a named volume by default.
      - uploads-data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Coolify reads these labels to route traffic via Traefik. The
    # SERVICE_FQDN_WEB token is auto-generated by Coolify; you can also set
    # your own FQDN in the Coolify UI under "Domains".
    labels:
      - coolify.managed=true
      - coolify.type=application
      - coolify.name=chefai-web
      - coolify.serviceName=web
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${SERVICE_FQDN_WEB}`)
      - traefik.http.routers.web.entrypoints=https
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads-data:
    driver: local
