# Replace placeholders DOMAIN with your real domain (e.g. chefai.app)
# Run docker/init-letsencrypt.sh once to obtain initial certs.

# HTTP — ACME challenge + redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name DOMAIN www.DOMAIN;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name DOMAIN www.DOMAIN;

  ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  client_max_body_size 8m;
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # HSTS — force HTTPS for 2 years incl. subdomains, allow preload listing.
  # Only emit on the TLS server block (never on the plain HTTP one).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Limit feature/permission grants the browser can hand to this origin
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(self)" always;

  # Defense-in-depth CSP. 'unsafe-inline' on script-src is unfortunately
  # required by Next.js for its bootstrap/RSC scripts. We accept it but
  # constrain everything else aggressively. img-src https: + data: covers
  # the Stripe/PayPal logos + uploaded recipe photos.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.paypal.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; frame-src https://js.stripe.com https://www.paypal.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://api-m.paypal.com https://api-m.sandbox.paypal.com https://api.resend.com; form-action 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'" always;

  # Webhooks: raw body, no buffering, no rewrites
  location /api/webhooks/ {
    proxy_pass http://web:3000;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Static uploads served directly by nginx (RO bind on the same volume)
  location /uploads/ {
    alias /app/public/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Next.js _next/static is fingerprinted — serve via web app, long cache
  location /_next/static/ {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # App
  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Plan creation can run several minutes due to image rate-limit pacing
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
